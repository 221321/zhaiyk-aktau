function useIsDesktop() {
  const [d, setD] = useState(() => window.matchMedia('(min-width: 900px)').matches);
  useEffect(() => {
    const m = window.matchMedia('(min-width: 900px)');
    const h = (e) => setD(e.matches);
    if (m.addEventListener) m.addEventListener('change', h); else m.addListener(h);
    return () => { if (m.removeEventListener) m.removeEventListener('change', h); else m.removeListener(h); };
  }, []);
  return d;
}

function getToken() { return localStorage.getItem('token'); }
function setToken(t) { localStorage.setItem('token', t); }
function removeToken() { localStorage.removeItem('token'); }

async function apiCall(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Ошибка сервера');
  return data;
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function subscribeToPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    return { ok: false, error: 'Push API не поддерживается этим браузером' };
  }
  let permission;
  try {
    permission = await Notification.requestPermission();
  } catch (e) {
    return { ok: false, error: 'requestPermission: ' + e.message };
  }
  if (permission !== 'granted') {
    return { ok: false, error: 'Разрешение не выдано (' + permission + ')' };
  }
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      const { publicKey } = await apiCall('GET', '/api/push/vapid-public-key');
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });
    }
    await apiCall('POST', '/api/push/subscribe', { subscription: sub });
    return { ok: true };
  } catch (e) {
    return { ok: false, error: (e && e.message) || String(e) };
  }
}

async function unsubscribeFromPush() {
  try {
    if (!('serviceWorker' in navigator)) return;
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      await apiCall('POST', '/api/push/unsubscribe', { endpoint: sub.endpoint });
      await sub.unsubscribe();
    }
  } catch (e) {
    console.error('Push unsubscribe failed:', e);
  }
}

function StatusBadge({status}) {
  return <span style={S.badge(status)}>{SL[status]||status}</span>;
}

function PaymentTags({payment}) {
  if (!payment) return null;
  const tags = [];
  if (payment.cash>0) tags.push({label:`Нал: ${payment.cash.toLocaleString()} ₸`, bg:C.cashGreen, color:"#15803D"});
  if (payment.qr>0)   tags.push({label:`QR: ${payment.qr.toLocaleString()} ₸`,   bg:C.qrBlue,   color:"#1D4ED8"});
  if (payment.debt>0) tags.push({label:`Долг: ${payment.debt.toLocaleString()} ₸`, bg:C.debtAmber, color:"#92400E"});
  return <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>{tags.map((t,i)=><span key={i} style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:5,background:t.bg,color:t.color,whiteSpace:"nowrap"}}>{t.label}</span>)}</div>;
}

function DriverPaymentBlock({ order, onUpdateStatus }) {
  const [payType, setPayType] = useState({ cash: false, qr: false, debt: false });
  const [payAmounts, setPayAmt] = useState({ cash: "", qr: "" });
  const total = order.total || 0;
  const cashPaid = payType.cash ? Number(payAmounts.cash)||0 : 0;
  const qrPaid   = payType.qr   ? Number(payAmounts.qr)  ||0 : 0;
  const remainder = Math.max(0, total - cashPaid - qrPaid);
  const debtAmount = payType.debt ? remainder : 0;
  const hasSelection = payType.cash || payType.qr || payType.debt;
  const canConfirm = hasSelection && (payType.debt || remainder === 0);

  const toggleCashQr = (key) => {
    const turningOn = !payType[key];
    if (turningOn && payAmounts[key] === "") {
      const otherKey = key === 'cash' ? 'qr' : 'cash';
      const otherAmt = payType[otherKey] ? (Number(payAmounts[otherKey])||0) : 0;
      setPayAmt(a => ({...a, [key]: String(Math.max(0, total - otherAmt))}));
    } else if (!turningOn) {
      setPayAmt(a => ({...a, [key]: ""}));
    }
    setPayType(pt => ({...pt, [key]: turningOn}));
  };

  return (
    <div style={{marginTop:20}}>
      <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:C.navy}}>Способ оплаты: {!hasSelection&&<span style={{color:C.red,fontWeight:400}}>(выберите хотя бы один)</span>}</p>
      {[{key:"cash",label:"Наличка",icon:"💵",bg:C.cashGreen,col:"#15803D"},{key:"qr",label:"QR код",icon:"📲",bg:C.qrBlue,col:"#1D4ED8"}].map(({key,label,icon,bg,col})=>(
        <div key={key} style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div onClick={()=>toggleCashQr(key)} style={{width:22,height:22,borderRadius:6,border:`2px solid ${payType[key]?col:C.border}`,background:payType[key]?col:C.white,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {payType[key]&&<span style={{color:C.white,fontSize:13,fontWeight:700}}>✓</span>}
            </div>
            <span style={{fontSize:14,fontWeight:600,color:payType[key]?col:C.textMid}}>{icon} {label}</span>
            {payType[key]&&<input style={{flex:1,border:`1.5px solid ${col}40`,borderRadius:6,padding:"6px 10px",fontSize:14,fontWeight:600,outline:"none",background:bg,color:col}} placeholder="Сумма ₸" value={payAmounts[key]} onFocus={e=>e.target.select()} onChange={e=>setPayAmt(a=>({...a,[key]:e.target.value}))}/>}
          </div>
        </div>
      ))}
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div onClick={()=>setPayType(pt=>({...pt,debt:!pt.debt}))} style={{width:22,height:22,borderRadius:6,border:`2px solid ${payType.debt?"#92400E":C.border}`,background:payType.debt?"#92400E":C.white,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {payType.debt&&<span style={{color:C.white,fontSize:13,fontWeight:700}}>✓</span>}
          </div>
          <span style={{fontSize:14,fontWeight:600,color:payType.debt?"#92400E":C.textMid}}>📋 Долг {payType.debt&&`(${remainder.toLocaleString()} ₸ — остаток посчитан сам)`}</span>
        </div>
      </div>
      <div style={{padding:"12px 14px",borderRadius:10,background:C.surface,border:`1px solid ${C.border}`,marginBottom:14}}>
        <div style={{...S.row,marginBottom:6}}><span style={{fontSize:12,color:C.textSub}}>Сумма заявки</span><span style={{fontWeight:700,fontFamily:FH}}>{total.toLocaleString()} ₸</span></div>
        <div style={{...S.row,paddingTop:6,borderTop:`1px solid ${C.border}`}}>
          <span style={{fontSize:13,fontWeight:700,color:debtAmount>0?"#92400E":(remainder>0?C.red:C.green)}}>{debtAmount>0?"📋 Долг":(remainder>0?"⚠️ Не хватает суммы":"✅ Полностью оплачено")}</span>
          {(debtAmount>0||remainder>0)&&<span style={{fontWeight:800,fontSize:15,fontFamily:FH,color:debtAmount>0?"#92400E":C.red}}>{(debtAmount>0?debtAmount:remainder).toLocaleString()} ₸</span>}
        </div>
      </div>
      <button style={{...S.btnSuccess,opacity:canConfirm?1:0.4,cursor:canConfirm?"pointer":"not-allowed"}} disabled={!canConfirm} onClick={()=>onUpdateStatus(order.id,"delivered",{cash:cashPaid,qr:qrPaid,debt:debtAmount})}>✅ Подтвердить доставку</button>
      <button style={S.btnDanger} onClick={()=>onUpdateStatus(order.id,"cancelled",null)}>❌ Не удалось доставить</button>
      <button style={{...S.btnOutline,borderColor:"#7C3AED",color:"#7C3AED",marginTop:8}} onClick={()=>onUpdateStatus(order.id,"returned",null)}>↩️ Оформить возврат</button>
    </div>
  );
}

function DebtsPanel() {
  const [debts, setDebts] = useState([]);
  const [loadingDebts, setLoadingDebts] = useState(true);
  const [settleAmounts, setSettleAmounts] = useState({});
  const [settleMethod, setSettleMethod] = useState({});
  const [savingId, setSavingId] = useState(null);

  const loadDebts = useCallback(async () => {
    try {
      const data = await apiCall('GET', '/api/debts');
      setDebts(data);
    } catch(e) {}
    setLoadingDebts(false);
  }, []);
  useEffect(()=>{ loadDebts(); }, []);

  const settle = async (d) => {
    const amount = Number(settleAmounts[d.order_id] ?? d.remaining);
    const method = settleMethod[d.order_id] || 'cash';
    if (!amount || amount<=0) return;
    setSavingId(d.order_id);
    try {
      await apiCall('POST', '/api/debts/settle', { orderId: d.order_id, amount, method });
      await loadDebts();
      setSettleAmounts(a=>({...a,[d.order_id]:''}));
    } catch(e) { alert(e.message); }
    setSavingId(null);
  };

  return (
    <>
      <p style={S.sectionTitle}>Должники</p>
      {loadingDebts?<div style={S.loadingWrap}>Загрузка...</div>:debts.length===0?<div style={{textAlign:"center",padding:"24px 0",color:C.textFaint}}>Долгов нет</div>:
        debts.map(d=>(
          <div key={d.order_id} style={{...S.card, borderLeft: d.overdue?`4px solid ${C.red}`:"4px solid #F59E0B", background: d.overdue?"#FEF2F2":C.white}}>
            <div style={S.row}>
              <div>
                <p style={S.cardTitle}>{d.client_name} {d.overdue&&<span style={{color:C.red,fontSize:11,fontWeight:700}}>· ПРОСРОЧЕН</span>}</p>
                <p style={{...S.cardSub,color:d.overdue?"#B91C1C":C.textSub}}>№ {d.order_id} · {d.date}{d.settled>0?` · погашено ${d.settled.toLocaleString()} ₸`:''}</p>
              </div>
              <p style={{margin:0,fontWeight:800,fontFamily:FH,color:d.overdue?C.red:"#92400E"}}>{d.remaining.toLocaleString()} ₸</p>
            </div>

async function shareWaybillPdf(order) {
  if (!window.jspdf || !window.html2canvas) {
    alert('Модуль печати ещё загружается, попробуйте через пару секунд');
    return;
  }
  const overlay = document.createElement('div');
  overlay.style.position = 'fixed';
  overlay.style.inset = '0';
  overlay.style.background = '#fff';
  overlay.style.zIndex = '99999';
  overlay.style.overflow = 'auto';
  overlay.style.display = 'flex';
  overlay.style.justifyContent = 'center';

  const label = document.createElement('div');
  label.textContent = 'Формируем PDF...';
  label.style.position = 'fixed';
  label.style.top = '8px';
  label.style.left = '0';
  label.style.right = '0';
  label.style.textAlign = 'center';
  label.style.color = '#888';
  label.style.fontSize = '13px';
  label.style.fontFamily = 'Arial, sans-serif';

  const container = document.createElement('div');
  container.style.width = '780px';
  container.style.background = '#fff';
  container.style.marginTop = '36px';
  container.style.marginBottom = '20px';
  const styleTag = document.createElement('style');
  styleTag.textContent = WAYBILL_STYLE;
  container.appendChild(styleTag);
  const contentDiv = document.createElement('div');
  contentDiv.innerHTML = buildWaybillInnerHtml(order);
  container.appendChild(contentDiv);

  overlay.appendChild(label);
  overlay.appendChild(container);
  document.body.appendChild(overlay);

  try {
    await new Promise(r => setTimeout(r, 50));
    const canvas = await html2canvas(container, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
    document.body.removeChild(overlay);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'pt', 'a4');
    const margin = 20;
    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();
    const imgWidth = pageWidth - margin * 2;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    const imgData = canvas.toDataURL('image/png');
    const usableHeight = pageHeight - margin * 2;

    let heightLeft = imgHeight;
    let position = margin;
    doc.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);
    heightLeft -= usableHeight;
    while (heightLeft > 0) {
      position = margin - (imgHeight - heightLeft);
      doc.addPage();
      doc.addImage(imgData, 'PNG', margin, position, imgWidth, imgHeight);
      heightLeft -= usableHeight;
    }

    const blob = doc.output('blob');
    const fileName = `nakladnaya-${order.id}.pdf`;
    const file = new File([blob], fileName, { type: 'application/pdf' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: `Накладная №${order.id}` });
      return;
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
    alert('PDF скачан. На компьютере системная отправка в WhatsApp недоступна — прикрепите файл вручную. На телефоне эта же кнопка сразу откроет "Поделиться".');
  } catch(e) {
    if (document.body.contains(overlay)) document.body.removeChild(overlay);
    if (e && e.name === 'AbortError') return;
    alert('Не удалось сформировать PDF: ' + e.message);
  }
}

}

function DriverCabinet({ user, onLogout }) {
  const [tab, setTab] = useState("queue");
  const [queueFilter, setQueueFilter] = useState("all");
  const [doneFilter, setDoneFilter] = useState("all");
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedOrder, setSelectedOrder] = useState(null);

  const loadOrders = useCallback(async () => {
    try {
      const data = await apiCall('GET', '/api/orders');
      setOrders(data);
    } catch(e) { if(e.message.includes('токен')) onLogout(); }
    setLoading(false);
  }, []);

  useEffect(() => { loadOrders(); }, []);

  const handleUpdate = async (id, status, payment) => {
    try {
      await apiCall('PUT', `/api/orders/${id}/status`, { status, payment });
      setSelectedOrder(null); loadOrders();
    } catch(e) { alert(e.message); }
  };

  const todayStr = new Date().toISOString().slice(0,10);
  const [driverDateFrom, setDriverDateFrom] = useState(todayStr);
  const [driverDateTo, setDriverDateTo] = useState(todayStr);
  const [driverPreset, setDriverPreset] = useState("day");

  const applyDriverPreset = (preset) => {
    const now = new Date();
    let from = new Date(now);
    if (preset === "week") from.setDate(now.getDate() - 6);
    else if (preset === "month") from.setDate(now.getDate() - 29);
    setDriverPreset(preset);
    if (preset !== "custom") {
      setDriverDateFrom(from.toISOString().slice(0,10));
      setDriverDateTo(todayStr);
    }
  };

  const queueAll = orders.filter(o=>o.status==="new"||o.status==="in_transit");
  const queueNew = orders.filter(o=>o.status==="new");
  const queueActive = orders.filter(o=>o.status==="in_transit");
  const queueShown = queueFilter==="new"?queueNew:queueFilter==="in_transit"?queueActive:queueAll;

  const myDoneAll = orders.filter(o=>o.driver_id===user.id&&o.date>=driverDateFrom&&o.date<=driverDateTo&&["delivered","cancelled","returned"].includes(o.status));
  const myDelivered = myDoneAll.filter(o=>o.status==="delivered");
  const myCancelled = myDoneAll.filter(o=>o.status==="cancelled");
  const myReturned = myDoneAll.filter(o=>o.status==="returned");
  const doneShown = doneFilter==="delivered"?myDelivered:doneFilter==="cancelled"?myCancelled:doneFilter==="returned"?myReturned:myDoneAll;

  const [showMyClients, setShowMyClients] = useState(false);
  const myCashTotal = myDelivered.reduce((s,o)=>s+(o.payment_cash||0),0);
  const myQrTotal = myDelivered.reduce((s,o)=>s+(o.payment_qr||0),0);
  const myDebtTotal = myDelivered.reduce((s,o)=>s+(o.payment_debt||0),0);
  const myClientBreakdown = {};
  myDelivered.forEach(o=>{
    const key = o.client_name;
    if(!myClientBreakdown[key]) myClientBreakdown[key] = { name:o.client_name, cash:0, qr:0, debt:0 };
    myClientBreakdown[key].cash += (o.payment_cash||0);
    myClientBreakdown[key].qr += (o.payment_qr||0);
    myClientBreakdown[key].debt += (o.payment_debt||0);
  });
  const myClientList = Object.values(myClientBreakdown).sort((a,b)=>(b.cash+b.qr+b.debt)-(a.cash+a.qr+a.debt));

  const QUEUE_FILTERS=[["all","Все"],["new","Ожидает"],["in_transit","В пути"]];
  const DONE_FILTERS=[["all","Все"],["delivered","Доставлено"],["cancelled","Отказ"],["returned","Возврат"]];

  const driverDateFilter = (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[["day","День"],["week","Неделя"],["month","Месяц"],["custom","Свободный отбор"]].map(([k,lb])=>(
          <button key={k} onClick={()=>applyDriverPreset(k)} style={{padding:"6px 13px",borderRadius:99,border:`1px solid ${driverPreset===k?C.navy:C.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:driverPreset===k?C.navy:C.white,color:driverPreset===k?C.white:C.textMid}}>{lb}</button>
        ))}
      </div>
      {driverPreset==="custom"&&(
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:120}}>
            <label style={{...S.label,marginBottom:4}}>С</label>
            <input type="date" style={{...S.input,padding:"8px 10px",fontSize:13}} value={driverDateFrom} onChange={e=>setDriverDateFrom(e.target.value)}/>
          </div>
          <div style={{flex:1,minWidth:120}}>
            <label style={{...S.label,marginBottom:4}}>По</label>
            <input type="date" style={{...S.input,padding:"8px 10px",fontSize:13}} value={driverDateTo} onChange={e=>setDriverDateTo(e.target.value)}/>
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div style={{paddingBottom:72}}>
      {selectedOrder&&<OrderDetail order={selectedOrder} onClose={()=>setSelectedOrder(null)} onUpdateStatus={handleUpdate} currentUser={user}/>}
      <div style={S.page}>
        {tab==="queue"&&<>
          <div style={S.statsRow}>
            <div style={S.statCard()}><p style={S.statNum(C.accent)}>{queueNew.length}</p><p style={S.statLabel}>Ожидают</p></div>
            <div style={S.statCard()}><p style={S.statNum(C.amber)}>{queueActive.length}</p><p style={S.statLabel}>В пути</p></div>
          </div>
          <p style={S.sectionTitle}>Очередь</p>
          <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
            {QUEUE_FILTERS.map(([k,lb])=>(
              <button key={k} onClick={()=>setQueueFilter(k)} style={{padding:"6px 13px",borderRadius:99,border:`1px solid ${queueFilter===k?C.navy:C.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:queueFilter===k?C.navy:C.white,color:queueFilter===k?C.white:C.textMid}}>{lb}</button>
            ))}
          </div>
          {loading?<div style={S.loadingWrap}>Загрузка...</div>:queueShown.length===0
            ?<div style={{textAlign:"center",padding:"48px 0",color:C.textFaint}}><div style={{fontSize:40,marginBottom:12}}>🚗</div><p>Нет заявок</p></div>
            :queueShown.map(o=>(
              <div key={o.id} style={{...S.card,cursor:"pointer",borderLeft:`4px solid ${SC[o.status]||'#999'}`}} onClick={()=>setSelectedOrder(o)}>
                <div style={S.row}>
                  <div style={{flex:1,marginRight:10}}>
                    <p style={S.cardTitle}>№ {o.id} · {o.client_name}</p>
                    <p style={S.cardSub}>{o.address}</p>
                    <p style={{...S.cardSub,marginTop:2}}>🕐 {o.time_slot} · {o.sales_name}</p>
                  </div>
                  <StatusBadge status={o.status}/>
                </div>
                <p style={{margin:"8px 0 4px",fontSize:13,color:C.textSub}}>Сумма: <b style={{color:C.text,fontFamily:FH}}>{(o.total||0).toLocaleString()} ₸</b></p>
                {o.status==="new"&&<button onClick={e=>{e.stopPropagation();handleUpdate(o.id,"in_transit",null);}} style={{marginTop:10,width:"100%",padding:"11px",background:C.navy,color:C.white,border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>🚚 Взять в доставку</button>}
              </div>
            ))
          }
        </>}
        {tab==="done"&&<>
          <div style={{...S.statsRow,gridTemplateColumns:"1fr 1fr 1fr"}}>
            <div style={S.statCard()}><p style={S.statNum(C.green)}>{myDelivered.length}</p><p style={S.statLabel}>Доставлено</p></div>
            <div style={S.statCard()}><p style={S.statNum(C.red)}>{myCancelled.length}</p><p style={S.statLabel}>Отказ</p></div>
            <div style={S.statCard()}><p style={S.statNum("#7C3AED")}>{myReturned.length}</p><p style={S.statLabel}>Возврат</p></div>
          </div>
          <p style={S.sectionTitle}>Закрытые заявки</p>
          {driverDateFilter}
          <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
            {DONE_FILTERS.map(([k,lb])=>(
              <button key={k} onClick={()=>setDoneFilter(k)} style={{padding:"6px 13px",borderRadius:99,border:`1px solid ${doneFilter===k?C.navy:C.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:doneFilter===k?C.navy:C.white,color:doneFilter===k?C.white:C.textMid}}>{lb}</button>
            ))}
          </div>
          {loading?<div style={S.loadingWrap}>Загрузка...</div>:doneShown.length===0
            ?<div style={{textAlign:"center",padding:"48px 0",color:C.textFaint}}><div style={{fontSize:40,marginBottom:12}}>📭</div><p>Ничего не закрыто за этот период</p></div>
            :doneShown.map(o=>(
              <div key={o.id} style={{...S.card,cursor:"pointer",borderLeft:`4px solid ${SC[o.status]||'#999'}`}} onClick={()=>setSelectedOrder(o)}>
                <div style={S.row}>
                  <div style={{flex:1,marginRight:10}}>
                    <p style={S.cardTitle}>№ {o.id} · {o.client_name}</p>
                    <p style={S.cardSub}>{o.address}</p>
                    <p style={{...S.cardSub,marginTop:2}}>🕐 {o.time_slot} · {o.sales_name}</p>
                  </div>
                  <StatusBadge status={o.status}/>
                </div>
                <p style={{margin:"8px 0 4px",fontSize:13,color:C.textSub}}>Сумма: <b style={{color:C.text,fontFamily:FH}}>{(o.total||0).toLocaleString()} ₸</b></p>
              </div>
            ))
          }
        </>}
        {tab==="cashbox"&&<>
          <p style={S.sectionTitle}>Касса за период</p>
          {driverDateFilter}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
            <div style={{background:C.cashGreen,borderRadius:10,padding:"10px"}}>
              <p style={{margin:"0 0 2px",fontSize:10,color:"#15803D",fontWeight:600}}>НАЛИЧКА</p>
              <p style={{margin:0,fontSize:15,fontWeight:800,fontFamily:FH,color:"#15803D"}}>{myCashTotal.toLocaleString()} ₸</p>
            </div>
            <div style={{background:C.qrBlue,borderRadius:10,padding:"10px"}}>
              <p style={{margin:"0 0 2px",fontSize:10,color:"#1D4ED8",fontWeight:600}}>QR</p>
              <p style={{margin:0,fontSize:15,fontWeight:800,fontFamily:FH,color:"#1D4ED8"}}>{myQrTotal.toLocaleString()} ₸</p>
            </div>
            <div style={{background:C.debtAmber,borderRadius:10,padding:"10px"}}>
              <p style={{margin:"0 0 2px",fontSize:10,color:"#92400E",fontWeight:600}}>ДОЛГ</p>
              <p style={{margin:0,fontSize:15,fontWeight:800,fontFamily:FH,color:"#92400E"}}>{myDebtTotal.toLocaleString()} ₸</p>
            </div>
          </div>
          {myClientList.length>0&&<>
            <div style={{...S.row,cursor:"pointer",marginBottom:8}} onClick={()=>setShowMyClients(s=>!s)}>
              <p style={{...S.sectionTitle,fontSize:15,margin:0}}>По точкам за период</p>
              <p style={{margin:0,fontSize:12,color:C.textFaint}}>{showMyClients?"▲ Свернуть":"▼ Показать"}</p>
            </div>
            {showMyClients&&myClientList.map((c,i)=>(
              <div key={i} style={S.card}>
                <p style={S.cardTitle}>{c.name}</p>
                <div style={{marginTop:6,display:"flex",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:"#15803D"}}>Нал: {c.cash.toLocaleString()} ₸</span>
                  <span style={{fontSize:12,color:"#1D4ED8"}}>QR: {c.qr.toLocaleString()} ₸</span>
                  <span style={{fontSize:12,color:"#92400E"}}>Долг: {c.debt.toLocaleString()} ₸</span>
                </div>
              </div>
            ))}
          </>}
          <div style={{marginTop:20}}><DebtsPanel/></div>
        </>}
      </div>
      <div style={S.nav}>
        {[["queue","📋","Очередь"],["done","✅","Закрытые"],["cashbox","💰","Касса"]].map(([k,ic,lb])=>(
          <button key={k} style={{...S.navBtn(tab===k),flex:1}} onClick={()=>setTab(k)}>
            <span style={S.navIcon}>{ic}</span><span style={S.navLabel(tab===k)}>{lb}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function AdminCabinet({ user, onLogout, desktop }) {
  const [tab, setTab] = useState("all");
  const [filter, setFilter] = useState("all");
  const [orderSearch, setOrderSearch] = useState("");
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [products, setProducts] = useState([]);
  const [aliasSearch, setAliasSearch] = useState("");
  const [edits, setEdits] = useState({});
  const [savingCode, setSavingCode] = useState(null);
  const [editingCodes, setEditingCodes] = useState({});

  const [clients, setClients] = useState([]);
  const [clientSearch, setClientSearch] = useState("");
  const [clientEdits, setClientEdits] = useState({});
  const [savingClientCode, setSavingClientCode] = useState(null);
  const [editingClientCodes, setEditingClientCodes] = useState({});

  const todayStr = new Date().toISOString().slice(0,10);
  const [dateFrom, setDateFrom] = useState(todayStr);
  const [dateTo, setDateTo] = useState(todayStr);
  const [adminPreset, setAdminPreset] = useState("day");

  const applyAdminPreset = (preset) => {
    const now = new Date();
    let from = new Date(now);
    if (preset === "week") from.setDate(now.getDate() - 6);
    else if (preset === "month") from.setDate(now.getDate() - 29);
    setAdminPreset(preset);
    if (preset !== "custom") {
      setDateFrom(from.toISOString().slice(0,10));
      setDateTo(todayStr);
    }
  };

  const [employees, setEmployees] = useState([]);
  const [users, setUsers] = useState([]);
  const [empSearch, setEmpSearch] = useState("");
  const [empForm, setEmpForm] = useState({});
  const [savingEmp, setSavingEmp] = useState(null);
  const [togglingUser, setTogglingUser] = useState(null);

  const loadEmployees = useCallback(async () => {
    try { setEmployees(await apiCall('GET','/api/employees')); } catch(e) {}
  }, []);
  const loadUsers = useCallback(async () => {
    try { setUsers(await apiCall('GET','/api/users')); } catch(e) {}
  }, []);
  useEffect(() => { loadEmployees(); loadUsers(); }, []);

  const ROLE_OPTIONS = [["sales","Торговый представитель"],["driver","Водитель"],["manager","Менеджер"],["admin","Администратор"]];

  const updateEmpForm = (formKey, field, value) => setEmpForm(f => ({...f, [formKey]: {...f[formKey], [field]: value}}));

  const createEmpAccount = async (emp, formKey) => {
    const form = empForm[formKey] || {};
    if (!form.login || !form.password || !form.role) { alert('Заполните логин, пароль и роль'); return; }
    if (form.password.length < 4) { alert('Пароль минимум 4 символа'); return; }
    setSavingEmp(formKey);
    try {
      await apiCall('POST','/api/users', { login: form.login, password: form.password, name: emp.name, role: form.role, region: form.region||'', employee_code: emp.code });
      await loadEmployees(); await loadUsers();
      setEmpForm(f => ({...f, [formKey]: {}}));
    } catch(e) { alert(e.message); }
    setSavingEmp(null);
  };

  const toggleUser = async (u) => {
    setTogglingUser(u.id);
    try {
      await apiCall('PUT', `/api/users/${u.id}/toggle`, {});
      await loadUsers();
    } catch(e) { alert(e.message); }
    setTogglingUser(null);
  };

  const loadClients = useCallback(async () => {
    try {
      const data = await fetch('/api/clients').then(r => r.json());
      setClients(data);
    } catch(e) {}
  }, []);

  useEffect(() => { loadClients(); }, []);

  const getClientField = (c, field) => {
    if (clientEdits[c.code] && clientEdits[c.code][field] !== undefined) return clientEdits[c.code][field];
    return c[field] || '';
  };
  const updateClientField = (code, field, value) => setClientEdits(e => ({...e, [code]: {...e[code], [field]: value}}));

  const saveClientAddress = async (c) => {
    const code = c.code;
    const address = getClientField(c, 'address');
    setSavingClientCode(code);
    try {
      await apiCall('POST', '/api/client-addresses', { code, address });
      await loadClients();
      setEditingClientCodes(e => { const n = {...e}; delete n[code]; return n; });
    } catch(e) { alert(e.message); }
    setSavingClientCode(null);
  };

  const loadOrders = useCallback(async () => {
    try {
      const data = await apiCall('GET', '/api/orders');
      setOrders(data);
    } catch(e) { if(e.message.includes('токен')) onLogout(); }
    setLoading(false);
  }, []);

  useEffect(() => { loadOrders(); }, []);

  const loadProducts = useCallback(async () => {
    try {
      const data = await fetch('/api/products').then(r => r.json());
      setProducts(data);
    } catch(e) {}
  }, []);

  useEffect(() => { loadProducts(); }, []);

  const getField = (p, field) => {
    if (edits[p.code] && edits[p.code][field] !== undefined) return edits[p.code][field];
    if (field === 'alias') return p.has_alias ? p.display_name : '';
    return p[field] != null ? String(p[field]) : '';
  };
  const updateField = (code, field, value) => setEdits(e => ({...e, [code]: {...e[code], [field]: value}}));

  const saveAlias = async (p) => {
    const code = p.code;
    const alias = getField(p, 'alias');
    const price1 = getField(p, 'price1');
    const price2 = getField(p, 'price2');
    const price3 = getField(p, 'price3');
    const commission = getField(p, 'commission');
    setSavingCode(code);
    try {
      await apiCall('POST', '/api/product-aliases', {
        code, alias,
        price1: price1 === '' ? null : Number(price1),
        price2: price2 === '' ? null : Number(price2),
        price3: price3 === '' ? null : Number(price3),
        commission: commission === '' ? 0 : Number(commission),
      });
      await loadProducts();
      setEditingCodes(e => { const n = {...e}; delete n[code]; return n; });
    } catch(e) { alert(e.message); }
    setSavingCode(null);
  };

  const handleUpdate = async (id, status, payment) => {
    try {
      await apiCall('PUT', `/api/orders/${id}/status`, { status, payment });
      setSelectedOrder(null); loadOrders();
    } catch(e) { alert(e.message); }
  };

  const handleDelete = async (id) => {
    try {
      await apiCall('DELETE', `/api/orders/${id}`);
      setSelectedOrder(null); loadOrders();
    } catch(e) { alert(e.message); }
  };

  const q = orderSearch.trim().toLowerCase();
  const filtered = orders
    .filter(o=>filter==="all"||o.status===filter)
    .filter(o=>!q
      || String(o.id).includes(q)
      || (o.client_name||'').toLowerCase().includes(q)
      || (o.sales_name||'').toLowerCase().includes(q)
      || (o.driver_name||'').toLowerCase().includes(q)
      || (o.address||'').toLowerCase().includes(q));
  const periodOrders = orders.filter(o=>o.date>=dateFrom&&o.date<=dateTo);
  const stats = {
    total:periodOrders.length,
    delivered:periodOrders.filter(o=>o.status==="delivered").length,
    inTransit:periodOrders.filter(o=>o.status==="in_transit").length,
    cancelled:periodOrders.filter(o=>o.status==="cancelled").length,
    returned:periodOrders.filter(o=>o.status==="returned").length,
    revenue:periodOrders.filter(o=>o.status==="delivered").reduce((s,o)=>s+(o.total||0),0),
    cashTotal:periodOrders.filter(o=>o.status==="delivered").reduce((s,o)=>s+(o.payment_cash||0),0),
    qrTotal:periodOrders.filter(o=>o.status==="delivered").reduce((s,o)=>s+(o.payment_qr||0),0),
    debtTotal:periodOrders.reduce((s,o)=>s+(o.payment_debt||0),0),
  };
  const [expandedSales, setExpandedSales] = useState({});
  const commissionByCode = {};
  products.forEach(p => { commissionByCode[p.code] = p.commission || 0; });
  const salesBreakdown = {};
  periodOrders.filter(o=>o.status==="delivered").forEach(o=>{
    const key = o.sales_id;
    if(!salesBreakdown[key]) salesBreakdown[key] = { name: o.sales_name, revenue: 0, items: [] };
    salesBreakdown[key].revenue += (o.total||0);
    const orderItems = typeof o.items === 'string' ? JSON.parse(o.items||'[]') : (o.items||[]);
    orderItems.forEach(it=>{
      const liveCommission = it.code && commissionByCode[it.code] !== undefined ? commissionByCode[it.code] : (it.commission||0);
      salesBreakdown[key].items.push({
        name: it.name,
        qty: it.qty,
        price: it.price,
        commission: liveCommission,
        bonus: (Number(it.qty)||0)*(Number(it.price)||0)*(Number(liveCommission)||0)/100
      });
    });
  });
  const salesList = Object.entries(salesBreakdown).map(([id,v])=>({
    id, ...v, totalBonus: v.items.reduce((s,it)=>s+it.bonus,0)
  })).sort((a,b)=>b.revenue-a.revenue);

  const cashByDriver = {};
  periodOrders.filter(o=>o.status==="delivered"&&o.driver_id).forEach(o=>{
    const key = o.driver_id;
    if(!cashByDriver[key]) cashByDriver[key] = { name: o.driver_name, cash:0, qr:0, debt:0, orders:0 };
    cashByDriver[key].cash += (o.payment_cash||0);
    cashByDriver[key].qr += (o.payment_qr||0);
    cashByDriver[key].debt += (o.payment_debt||0);
    cashByDriver[key].orders += 1;
  });
  const driverCashList = Object.values(cashByDriver).sort((a,b)=>b.cash-a.cash);

  const FILTERS=[["all","Все"],["new","Ожидает"],["in_transit","В пути"],["delivered","Доставлено"],["cancelled","Отказ"],["returned","Возврат"],["revoked","Отозвана"]];
  const TABS=[["all","📋","Заявки"],["report","📊","Отчёт"],["cashbox","💵","Касса"],["aliases","🏷","Товары"],["employees","👤","Сотрудники"]];
  const TAB_TITLES={all:"Заявки",report:"Отчёт",cashbox:"Касса",aliases:"Псевдонимы товаров",employees:"Сотрудники"};

  const dateRangeInputs = (
    <div style={{marginBottom:16,maxWidth:420}}>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[["day","День"],["week","Неделя"],["month","Месяц"],["custom","Свободный отбор"]].map(([k,lb])=>(
          <button key={k} onClick={()=>applyAdminPreset(k)} style={{padding:"6px 13px",borderRadius:99,border:`1px solid ${adminPreset===k?C.navy:C.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:adminPreset===k?C.navy:C.white,color:adminPreset===k?C.white:C.textMid}}>{lb}</button>
        ))}
      </div>
      {adminPreset==="custom"&&(
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:120}}>
            <label style={{...S.label,marginBottom:4}}>С</label>
            <input type="date" style={{...S.input,padding:"8px 10px",fontSize:13}} value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          </div>
          <div style={{flex:1,minWidth:120}}>
            <label style={{...S.label,marginBottom:4}}>По</label>
            <input type="date" style={{...S.input,padding:"8px 10px",fontSize:13}} value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
          </div>
        </div>
      )}
    </div>
  );

  const filterChips = (
    <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
      {FILTERS.map(([k,lb])=>(
        <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 13px",borderRadius:99,border:`1px solid ${filter===k?C.navy:C.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:filter===k?C.navy:C.white,color:filter===k?C.white:C.textMid}}>{lb}</button>
      ))}
    </div>
  );

  const searchInput = (
    <input
      style={{...S.input, maxWidth: desktop?360:"100%", marginBottom:12}}
      placeholder="Поиск по номеру, клиенту, торговому…"
      value={orderSearch}
      onChange={e=>setOrderSearch(e.target.value)}
    />
  );

  const ordersTable = (
    <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:R,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr>{["№","Клиент","Торговый","Взял на доставку","Сумма","Оплата","Статус"].map((h,i)=><th key={i} style={S.th}>{h}</th>)}</tr>
          </thead>
          <tbody>
            {filtered.map(o=>{
              const payment = {cash:o.payment_cash||0,qr:o.payment_qr||0,debt:o.payment_debt||0};
              return (
                <tr key={o.id} className="rowh" onClick={()=>setSelectedOrder(o)} style={{cursor:"pointer"}}>
                  <td style={{...S.td,fontFamily:FH,fontWeight:800}}>{o.id}</td>
                  <td style={S.td}>
                    <div style={{fontWeight:600}}>{o.client_name}</div>
                    <div style={{fontSize:12,color:C.textSub}}>{o.address}{o.time_slot?' · '+o.time_slot:''}</div>
                  </td>
                  <td style={S.td}>{o.sales_name}</td>
                  <td style={S.td}>{o.driver_name || <span style={{color:C.textSub,fontStyle:"italic",fontSize:13}}>не назначен</span>}</td>
                  <td style={{...S.td,fontFamily:FH,fontWeight:800,whiteSpace:"nowrap"}}>{(o.total||0).toLocaleString()} ₸</td>
                  <td style={S.td}><PaymentTags payment={payment}/></td>
                  <td style={S.td}><StatusBadge status={o.status}/></td>
                </tr>
              );
            })}
            {filtered.length===0&&(
              <tr><td colSpan="7" style={{...S.td,textAlign:"center",color:C.textFaint,padding:"40px 0"}}>Заявок нет</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );

  const content = (
    <>
      {tab==="all"&&<>
        {!desktop&&<p style={S.sectionTitle}>Все заявки</p>}
        {searchInput}
        {filterChips}
        {loading?<div style={S.loadingWrap}>Загрузка...</div>
          :desktop
            ? ordersTable
            : (filtered.length===0
              ?<div style={{textAlign:"center",padding:"48px 0",color:C.textFaint}}><div style={{fontSize:40,marginBottom:12}}>📋</div><p>Заявок нет</p></div>
              :filtered.map(o=><OrderCard key={o.id} order={o} onOpen={setSelectedOrder}/>))
        }
      </>}
      {tab==="report"&&<>
        {!desktop&&<p style={S.sectionTitle}>Отчёт</p>}
        {dateRangeInputs}
        <div style={{...S.statsRow, gridTemplateColumns: desktop?"repeat(5, minmax(0,1fr))":"1fr 1fr", maxWidth: desktop?900:"none"}}>
          <div style={S.statCard()}><p style={S.statNum()}>{stats.total}</p><p style={S.statLabel}>Всего</p></div>
          <div style={S.statCard()}><p style={S.statNum(C.green)}>{stats.delivered}</p><p style={S.statLabel}>Доставлено</p></div>
          <div style={S.statCard()}><p style={S.statNum(C.amber)}>{stats.inTransit}</p><p style={S.statLabel}>В пути</p></div>
          <div style={S.statCard()}><p style={S.statNum(C.red)}>{stats.cancelled}</p><p style={S.statLabel}>Не доставлено</p></div>
          <div style={S.statCard()}><p style={S.statNum("#7C3AED")}>{stats.returned}</p><p style={S.statLabel}>Возвратов</p></div>
        </div>
        <div style={{...S.revenueCard, maxWidth: desktop?560:"none"}}>
          <p style={S.revenueLabel}>Общая выручка</p>
          <p style={{...S.revenueNum, marginBottom:14}}>{stats.revenue.toLocaleString()} ₸</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[{label:"Наличка",val:stats.cashTotal,bg:C.cashGreen,col:"#15803D"},{label:"QR код",val:stats.qrTotal,bg:C.qrBlue,col:"#1D4ED8"},{label:"Долг",val:stats.debtTotal,bg:C.debtAmber,col:"#92400E"}].map(({label,val,bg,col})=>(
              <div key={label} style={{background:bg,borderRadius:10,padding:"10px 8px"}}>
                <p style={{margin:"0 0 2px",fontSize:10,color:col,fontWeight:700}}>{label.toUpperCase()}</p>
                <p style={{margin:0,fontSize:13,fontWeight:800,fontFamily:FH,color:col}}>{(val||0).toLocaleString()} ₸</p>
              </div>
            ))}
          </div>
        </div>
        <div style={{maxWidth: desktop?560:"none"}}>
          <p style={{...S.sectionTitle,fontSize:15,marginTop:8}}>По торговым представителям</p>
          {salesList.length===0?<div style={{textAlign:"center",padding:"32px 0",color:C.textFaint}}>Нет доставленных заявок за этот период</div>:
            salesList.map(s=>(
              <div key={s.id} style={S.card}>
                <div style={{...S.row,cursor:"pointer"}} onClick={()=>setExpandedSales(e=>({...e,[s.id]:!e[s.id]}))}>
                  <div>
                    <p style={S.cardTitle}>{s.name}</p>
                    <p style={S.cardSub}>{s.items.length} поз. продано</p>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <p style={{margin:0,fontWeight:800,fontFamily:FH,color:C.navy}}>{s.revenue.toLocaleString()} ₸</p>
                    <p style={{margin:0,fontSize:11,color:C.textFaint}}>{expandedSales[s.id]?"▲ Свернуть":"▼ Подробнее"}</p>
                  </div>
                </div>
                {expandedSales[s.id]&&(
                  <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`}}>
                    {s.items.map((it,i)=>(
                      <div key={i} style={{...S.row,marginBottom:6,fontSize:12,alignItems:"flex-start"}}>
                        <span style={{color:C.textMid,flex:1}}>{it.name} <span style={{color:C.textFaint}}>×{it.qty}</span></span>
                        <span style={{color:C.textSub,textAlign:"right"}}>{it.commission}% = <strong style={{color:C.green}}>{it.bonus.toLocaleString(undefined,{maximumFractionDigits:0})} ₸</strong></span>
                      </div>
                    ))}
                    <div style={{...S.row,marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`,fontWeight:700}}>
                      <span style={{fontSize:13,color:C.textMid}}>Итого бонус</span>
                      <span style={{fontSize:15,fontFamily:FH,fontWeight:800,color:C.green}}>{s.totalBonus.toLocaleString(undefined,{maximumFractionDigits:0})} ₸</span>
                    </div>
                  </div>
                )}
              </div>
          ))}
        </div>
      </>}
      {tab==="cashbox"&&<>
        {!desktop&&<p style={S.sectionTitle}>Касса</p>}
        {dateRangeInputs}
        <div style={{maxWidth: desktop?560:"none"}}>
          <p style={{...S.sectionTitle,fontSize:15}}>Сдача кассы по водителям</p>
          {driverCashList.length===0?<div style={{textAlign:"center",padding:"24px 0",color:C.textFaint}}>Нет закрытых водителями заявок за период</div>:
            driverCashList.map((d,i)=>(
              <div key={i} style={S.card}>
                <p style={S.cardTitle}>{d.name}</p>
                <p style={S.cardSub}>{d.orders} заявок доставлено</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:10}}>
                  <div style={{background:C.cashGreen,borderRadius:10,padding:"8px 10px"}}>
                    <p style={{margin:"0 0 2px",fontSize:10,color:"#15803D",fontWeight:700}}>НАЛИЧКА</p>
                    <p style={{margin:0,fontSize:14,fontWeight:800,fontFamily:FH,color:"#15803D"}}>{d.cash.toLocaleString()} ₸</p>
                  </div>
                  <div style={{background:C.qrBlue,borderRadius:10,padding:"8px 10px"}}>
                    <p style={{margin:"0 0 2px",fontSize:10,color:"#1D4ED8",fontWeight:700}}>QR</p>
                    <p style={{margin:0,fontSize:14,fontWeight:800,fontFamily:FH,color:"#1D4ED8"}}>{d.qr.toLocaleString()} ₸</p>
                  </div>
                  <div style={{background:C.debtAmber,borderRadius:10,padding:"8px 10px"}}>
                    <p style={{margin:"0 0 2px",fontSize:10,color:"#92400E",fontWeight:700}}>ДОЛГ</p>
                    <p style={{margin:0,fontSize:14,fontWeight:800,fontFamily:FH,color:"#92400E"}}>{d.debt.toLocaleString()} ₸</p>
                  </div>
                </div>
              </div>
          ))}
          <div style={{marginTop:20}}><DebtsPanel/></div>
        </div>
      </>}
      {tab==="aliases"&&<>
        {!desktop&&<p style={S.sectionTitle}>Псевдонимы товаров</p>}
        <div style={{maxWidth: desktop?720:"none"}}>
          <p style={{fontSize:12,color:C.textSub,marginTop:desktop?0:-8,marginBottom:12}}>
            Название из 1С меняется от поставки к поставке — задай здесь постоянное имя, которое увидят торгпреды.
          </p>
          <input
            style={{...S.input,marginBottom:12}}
            placeholder="Поиск по названию или коду..."
            value={aliasSearch}
            onChange={e=>setAliasSearch(e.target.value)}
          />
          {products
            .filter(p => !aliasSearch || p.name.toLowerCase().includes(aliasSearch.toLowerCase()) || (p.code||'').includes(aliasSearch))
            .map(p => {
              const locked = p.has_alias && !editingCodes[p.code];
              return (
              <div key={p.code} style={{...S.card, padding:10, marginBottom:6}}>
                <div style={{fontSize:11,color:C.textFaint,marginBottom:2}}>Код 1С: {p.code} {p.group?' · '+p.group:''}</div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:6,color:C.textMid}}>{p.name}</div>
                <input
                  style={{...S.input,padding:"7px 10px",fontSize:13,marginBottom:6,background:locked?C.surface:C.white,color:locked?C.textSub:C.text}}
                  placeholder="Название для сайта (необязательно)"
                  disabled={locked}
                  value={getField(p,'alias')}
                  onChange={e=>updateField(p.code,'alias',e.target.value)}
                />
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 70px auto",gap:6,marginBottom:3}}>
                  {["Цена 1","Цена 2","Цена 3","% торговому",""].map((h,i)=><div key={i} style={{fontSize:9,fontWeight:600,color:C.textFaint,textTransform:"uppercase"}}>{h}</div>)}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <input
                    style={{...S.input,padding:"7px 8px",fontSize:12,background:locked?C.surface:C.white,color:locked?C.textSub:C.text}}
                    placeholder="Цена 1"
                    type="number"
                    disabled={locked}
                    value={getField(p,'price1')}
                    onFocus={e=>e.target.select()}
                    onChange={e=>updateField(p.code,'price1',e.target.value)}
                  />
                  <input
                    style={{...S.input,padding:"7px 8px",fontSize:12,background:locked?C.surface:C.white,color:locked?C.textSub:C.text}}
                    placeholder="Цена 2"
                    type="number"
                    disabled={locked}
                    value={getField(p,'price2')}
                    onFocus={e=>e.target.select()}
                    onChange={e=>updateField(p.code,'price2',e.target.value)}
                  />
                  <input
                    style={{...S.input,padding:"7px 8px",fontSize:12,background:locked?C.surface:C.white,color:locked?C.textSub:C.text}}
                    placeholder="Цена 3"
                    type="number"
                    disabled={locked}
                    value={getField(p,'price3')}
                    onFocus={e=>e.target.select()}
                    onChange={e=>updateField(p.code,'price3',e.target.value)}
                  />
                  <div style={{position:"relative",width:70}}>
                    <input
                      style={{...S.input,padding:"7px 18px 7px 8px",fontSize:12,background:locked?C.surface:"#FFFBEB",color:locked?C.textSub:"#92400E",fontWeight:700,borderColor:locked?C.border:"#FDE68A",width:70}}
                      placeholder="0"
                      type="number"
                      disabled={locked}
                      value={getField(p,'commission')}
                      onFocus={e=>e.target.select()}
                      onChange={e=>updateField(p.code,'commission',e.target.value)}
                    />
                    <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:12,fontWeight:700,color:locked?C.textFaint:"#92400E",pointerEvents:"none"}}>%</span>
                  </div>
                  <button
                    style={{...S.btnPrimary, padding:"7px 14px", fontSize:12, marginTop:0, boxShadow:"none", opacity: savingCode===p.code?0.5:1, width:"auto", whiteSpace:"nowrap"}}
                    disabled={savingCode===p.code}
                    onClick={()=>{
                      if (locked) { setEditingCodes(e=>({...e,[p.code]:true})); }
                      else { saveAlias(p); }
                    }}
                  >{locked ? "Редакт." : "Сохр."}</button>
                </div>
              </div>
          )})}
          {products.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:C.textFaint}}>Номенклатура ещё не синхронизирована из 1С</div>}
        </div>
      </>}
      {tab==="employees"&&<>
        {!desktop&&<p style={S.sectionTitle}>Сотрудники</p>}
        <div style={{maxWidth: desktop?560:"none"}}>
          <p style={{fontSize:12,color:C.textSub,marginTop:desktop?0:-8,marginBottom:12}}>
            ФИО приходит из 1С. Для новых сотрудников задай роль, логин и пароль — появится рабочий вход на сайт.
          </p>
          <input
            style={{...S.input,marginBottom:16}}
            placeholder="Поиск по ФИО или коду..."
            value={empSearch}
            onChange={e=>setEmpSearch(e.target.value)}
          />
          <p style={{...S.sectionTitle,fontSize:15}}>Без учётной записи</p>
          {employees.filter(e=>!e.has_account&&(!empSearch||e.name.toLowerCase().includes(empSearch.toLowerCase())||(e.code||'').includes(empSearch))).map((emp,empIdx)=>{
            const formKey = (emp.code||'nocode')+'_'+empIdx;
            return (
            <div key={formKey} style={{...S.card,padding:10,marginBottom:6}}>
              <div style={{fontSize:11,color:C.textFaint,marginBottom:2}}>Код 1С: {emp.code}</div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:C.textMid}}>{emp.name}</div>
              <select style={{...S.select,padding:"7px 8px",fontSize:12,marginBottom:6}} value={(empForm[formKey]||{}).role||''} onChange={e=>updateEmpForm(formKey,'role',e.target.value)}>
                <option value="">— Роль —</option>
                {ROLE_OPTIONS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
              <div style={{display:"flex",gap:6}}>
                <input style={{...S.input,padding:"7px 8px",fontSize:12}} placeholder="Логин" value={(empForm[formKey]||{}).login||''} onChange={e=>updateEmpForm(formKey,'login',e.target.value)}/>
                <input style={{...S.input,padding:"7px 8px",fontSize:12}} placeholder="Пароль" value={(empForm[formKey]||{}).password||''} onChange={e=>updateEmpForm(formKey,'password',e.target.value)}/>
                <button style={{...S.btnPrimary,padding:"7px 14px",fontSize:12,marginTop:0,boxShadow:"none",width:"auto",whiteSpace:"nowrap",opacity:savingEmp===formKey?0.5:1}} disabled={savingEmp===formKey} onClick={()=>createEmpAccount(emp,formKey)}>Создать</button>
              </div>
            </div>
            );
          })}
          {employees.filter(e=>!e.has_account).length===0&&<div style={{textAlign:"center",padding:"16px 0",color:C.textFaint,fontSize:13}}>Все сотрудники из 1С уже с аккаунтами</div>}

          <p style={{...S.sectionTitle,fontSize:15,marginTop:20}}>Учётные записи</p>
          {users.map(u=>(
            <div key={u.id} style={{...S.card,padding:10,marginBottom:6,opacity:u.active?1:0.55}}>
              <div style={S.row}>
                <div>
                  <p style={S.cardTitle}>{u.name} {!u.active&&<span style={{color:C.red,fontSize:11,fontWeight:700}}>· ОТКЛЮЧЁН</span>}</p>
                  <p style={S.cardSub}>{u.login} · {ROLE_OPTIONS.find(([v])=>v===u.role)?.[1]||u.role}</p>
                </div>
                <button
                  style={{...S.btnSecondary,opacity:togglingUser===u.id?0.5:1}}
                  disabled={togglingUser===u.id}
                  onClick={()=>toggleUser(u)}
                >{u.active?"Отключить":"Включить"}</button>
              </div>
            </div>
          ))}
        </div>
      </>}
    </>
  );

  const ROLE_LABEL = { sales:"Торговый представитель", driver:"Водитель", admin:"Администратор", manager:"Менеджер" };

  if (desktop) {
    return (
      <div style={{display:"flex",minHeight:"100vh",background:C.surface,alignItems:"flex-start"}}>
        {selectedOrder&&<OrderDetail order={selectedOrder} onClose={()=>setSelectedOrder(null)} onUpdateStatus={handleUpdate} onDeleteOrder={handleDelete} currentUser={user}/>}
        <aside style={S.side}>
          <div style={{marginBottom:34}}><Brand size={44}/></div>
          <nav style={{flex:1}}>
            {TABS.map(([k,ic,lb])=>(
              <button key={k} style={S.sideLink(tab===k)} onClick={()=>setTab(k)}>
                <span style={{fontSize:16}}>{ic}</span>{lb}
              </button>
            ))}
          </nav>
          <div style={{fontSize:12,color:"#8B8681",lineHeight:1.6}}>
            {ROLE_LABEL[user.role]} · {user.name}<br/>
            <button style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textMid,padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:12,marginTop:8}} onClick={onLogout}>Выйти</button>
          </div>
        </aside>
        <main style={S.main}>
          <h1 style={S.h1}>{TAB_TITLES[tab]}</h1>
          <div style={{...S.h1sub, marginBottom:22}}>{new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})}</div>
          {content}
        </main>
      </div>
    );
  }

  return (
    <div style={{paddingBottom:72}}>
      {selectedOrder&&<OrderDetail order={selectedOrder} onClose={()=>setSelectedOrder(null)} onUpdateStatus={handleUpdate} onDeleteOrder={handleDelete} currentUser={user}/>}
      <div style={S.page}>
        {content}
      </div>
      <div style={S.nav}>
        {[["all","📋","Заявки"],["report","📊","Отчёт"],["cashbox","💵","Касса"],["aliases","🏷","Товары"],["employees","👤","Сотр."]].map(([k,ic,lb])=>(
          <button key={k} style={S.navBtn(tab===k)} onClick={()=>setTab(k)}>
            <span style={S.navIcon}>{ic}</span><span style={S.navLabel(tab===k)}>{lb}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [login, setLogin] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [checking, setChecking] = useState(true);
  const [pushStatus, setPushStatus] = useState(
    (typeof Notification !== 'undefined') ? Notification.permission : 'unsupported'
  );
  const [pushMsg, setPushMsg] = useState('');
  const isDesktop = useIsDesktop();

  useEffect(() => {
    const token = getToken();
    if (token) {
      try {
        const parts = token.split('.');
        const base64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        const payload = JSON.parse(jsonPayload);
        if (payload.exp * 1000 > Date.now()) {
          setUser({ id: payload.id, name: payload.name, role: payload.role, region: payload.region });
          if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
            trySilentSubscribe();
          }
        } else {
          removeToken();
        }
      } catch(e) {
        removeToken();
      }
    }
    setChecking(false);
  }, []);

  const handleLogin = async () => {
    setLoading(true); setError("");
    try {
      const data = await apiCall('POST', '/api/login', { login, password });
      setToken(data.token);
      setUser(data.user);
      if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
        trySilentSubscribe();
      }
    } catch(e) {
      setError(e.message);
    }
    setLoading(false);
  };

  const handleLogout = () => { unsubscribeFromPush(); removeToken(); setUser(null); };
  const enablePush = () => {
    setPushMsg('Подключаем...');
    subscribeToPush().then((result) => {
      if (typeof Notification !== 'undefined') setPushStatus(Notification.permission);
      setPushMsg(result.ok ? 'Уведомления включены ✓' : 'Ошибка: ' + result.error);
      setTimeout(() => setPushMsg(''), 6000);
    });
  };
  const trySilentSubscribe = () => {
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    setPushMsg('Проверяем подписку...');
    subscribeToPush().then((result) => {
      setPushMsg(result.ok ? 'Подписка активна ✓' : 'Ошибка подписки: ' + result.error);
      setTimeout(() => setPushMsg(''), 8000);
    });
  };
  const ROLE_LABEL = { sales:"Торговый представитель", driver:"Водитель", admin:"Администратор", manager:"Менеджер" };

  if (checking) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.surface}}>
      <div style={{fontSize:14,color:C.textSub}}>Загрузка...</div>
    </div>
  );

  if (!user) return (
    <div style={S.loginWrap}>
      <div style={S.loginCard}>
        <img src="/icon-192.png" alt="" style={{width:76,height:76,display:"block",margin:"0 auto 14px"}}/>
        <h1 style={{...S.logoTitle,textAlign:"center"}}>Жайық Ақтау</h1>
        <p style={{...S.logoSub,textAlign:"center"}}>құс өнімі · система заявок</p>
        {error&&<div style={S.errorBox}>{error}</div>}
        <div style={S.formGroup}><label style={S.label}>Логин</label><input style={S.input} value={login} onChange={e=>setLogin(e.target.value)} placeholder="Введите логин"/></div>
        <div style={{...S.formGroup,marginBottom:20}}><label style={S.label}>Пароль</label><input style={S.input} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Введите пароль" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/></div>
        <button style={{...S.btnPrimary,opacity:loading?0.7:1}} onClick={handleLogin} disabled={loading}>{loading?"Вход...":"Войти"}</button>
      </div>
    </div>
  );

  // менеджер/админ на большом экране — версия с сайдбаром
  if ((user.role==="admin"||user.role==="manager") && isDesktop) {
    return (
      <div style={S.app}>
        {(pushStatus==="default" || pushMsg) && (
          <div style={{background:C.accent,color:"#fff",padding:"10px 16px",fontSize:13}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
              <span>Включите уведомления, чтобы не пропускать новые заявки</span>
              <button onClick={enablePush} style={{background:"#fff",color:C.accent,border:"none",borderRadius:8,padding:"6px 14px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Включить</button>
            </div>
            {pushMsg && <div style={{marginTop:6,fontSize:12,opacity:0.95}}>{pushMsg}</div>}
          </div>
        )}
        {pushStatus==="denied" && (
          <div style={{background:"#78716C",color:"#fff",padding:"10px 16px",fontSize:12,lineHeight:1.4}}>
            Уведомления заблокированы в настройках телефона. Зайдите в настройки уведомлений приложения "Жайык" в системе и разрешите их вручную.
          </div>
        )}
        <AdminCabinet user={user} onLogout={handleLogout} desktop={true}/>
      </div>
    );
  }

  return (
    <div style={S.app}>
      {(pushStatus==="default" || pushMsg) && (
        <div style={{background:C.accent,color:"#fff",padding:"10px 16px",fontSize:13}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <span>Включите уведомления о заявках</span>
            <button onClick={enablePush} style={{background:"#fff",color:C.accent,border:"none",borderRadius:8,padding:"6px 14px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Включить</button>
          </div>
          {pushMsg && <div style={{marginTop:6,fontSize:12,opacity:0.95}}>{pushMsg}</div>}
        </div>
      )}
      {pushStatus==="denied" && (
        <div style={{background:"#78716C",color:"#fff",padding:"10px 16px",fontSize:12,lineHeight:1.4}}>
          Уведомления заблокированы в настройках телефона. Зайдите в настройки уведомлений приложения "Жайык" в системе и разрешите их вручную.
        </div>
      )}
      <div style={S.header}>
        <Brand size={40}/>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{user.name}</div>
          <div style={{fontSize:11,color:C.textSub}}>{ROLE_LABEL[user.role]} · <button style={S.logoutBtn} onClick={handleLogout}>Выйти</button></div>
        </div>
      </div>
      {user.role==="sales"&&<SalesCabinet user={user} onLogout={handleLogout}/>}
      {user.role==="driver"&&<DriverCabinet user={user} onLogout={handleLogout}/>}
      {(user.role==="admin"||user.role==="manager")&&<AdminCabinet user={user} onLogout={handleLogout} desktop={false}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch((err) => {
      console.error('SW registration failed:', err);
    });
  });
}
</script>
</body>
</html>
