<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ЖАЙЫК АКТАУ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #F8F9FB; }
input, select, textarea, button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = '';

const CLIENTS = [
  { id: 1, name: 'ТОО "Продукты KZ"',  address: "ул. Абая 15" },
  { id: 2, name: "ИП Иванов",           address: "пр. Достык 42" },
  { id: 3, name: 'Магазин "Береке"',    address: "ул. Сейфуллина 88" },
  { id: 4, name: 'ТОО "Алтын Дала"',   address: "пр. Аль-Фараби 5" },
  { id: 5, name: 'ИП Касымова',         address: "мкр. Мамыр 12" },
];

const TIME_SLOTS = ["До обеда (09:00 – 14:00)", "После обеда (14:00 – 19:00)"];

const SL = { new: "Ожидает", in_transit: "В пути", delivered: "Доставлено", cancelled: "Не доставлено", returned: "Возврат" };
const SC = { new: "#2563EB", in_transit: "#D97706", delivered: "#16A34A", cancelled: "#DC2626", returned: "#7C3AED" };
const SB = { new: "#EFF6FF", in_transit: "#FFFBEB", delivered: "#F0FDF4", cancelled: "#FEF2F2", returned: "#F5F3FF" };

const C = {
  navy:"#1B2B4B", accent:"#2563EB", white:"#FFFFFF", surface:"#F8F9FB",
  border:"#E4E7EC", text:"#111827", textMid:"#374151", textSub:"#6B7280", textFaint:"#9CA3AF",
  green:"#16A34A", amber:"#D97706", red:"#DC2626",
  cashGreen:"#DCFCE7", qrBlue:"#DBEAFE", debtAmber:"#FEF3C7",
};

const S = {
  app: { fontFamily:"inherit", minHeight:"100vh", background:C.surface, color:C.text, fontSize:14 },
  loginWrap: { minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24 },
  loginCard: { background:C.white, border:`1px solid ${C.border}`, borderRadius:12, padding:"44px 36px", width:"100%", maxWidth:380, boxShadow:"0 4px 24px rgba(0,0,0,0.07)" },
  logoTitle: { fontSize:22, fontWeight:700, color:C.navy, margin:"0 0 4px" },
  logoSub: { fontSize:13, color:C.textSub, margin:"0 0 32px" },
  label: { display:"block", fontSize:12, fontWeight:600, color:C.textMid, marginBottom:6, letterSpacing:"0.04em", textTransform:"uppercase" },
  input: { width:"100%", padding:"11px 13px", border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:14, outline:"none", boxSizing:"border-box", background:C.white, color:C.text },
  btnPrimary: { width:"100%", padding:"12px", background:C.navy, color:C.white, border:"none", borderRadius:8, fontSize:14, fontWeight:600, cursor:"pointer", marginTop:4 },
  errorBox: { background:"#FEF2F2", color:C.red, border:"1px solid #FECACA", padding:"10px 13px", borderRadius:8, fontSize:13, marginBottom:16 },
  header: { background:C.navy, color:C.white, padding:"0 20px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 },
  headerMark: { background:"rgba(255,255,255,0.12)", borderRadius:6, padding:"3px 8px", fontSize:11, fontWeight:700, letterSpacing:"0.08em", color:"rgba(255,255,255,0.7)", marginBottom:2 },
  headerSub: { fontSize:11, color:"rgba(255,255,255,0.5)" },
  logoutBtn: { background:"transparent", border:"1px solid rgba(255,255,255,0.2)", color:"rgba(255,255,255,0.7)", padding:"5px 12px", borderRadius:6, cursor:"pointer", fontSize:12 },
  page: { padding:"20px 16px 80px", maxWidth:480, margin:"0 auto" },
  card: { background:C.white, border:`1px solid ${C.border}`, borderRadius:10, padding:"14px 16px", marginBottom:10 },
  cardTitle: { fontSize:14, fontWeight:600, color:C.text, margin:"0 0 3px" },
  cardSub: { fontSize:12, color:C.textSub, margin:0 },
  badge: (s) => ({ display:"inline-block", padding:"2px 9px", borderRadius:4, fontSize:11, fontWeight:600, color:SC[s], background:SB[s], border:`1px solid ${SC[s]}30` }),
  statsRow: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:18 },
  statCard: (a) => ({ background:C.white, border:`1px solid ${C.border}`, borderRadius:10, padding:"14px 16px", borderTop:`3px solid ${a}` }),
  statNum: { fontSize:26, fontWeight:800, color:C.navy, margin:"0 0 2px" },
  statLabel: { fontSize:11, color:C.textSub, margin:0, fontWeight:500 },
  nav: { position:"fixed", bottom:0, left:0, right:0, background:C.white, borderTop:`1px solid ${C.border}`, display:"flex", zIndex:100 },
  navBtn: (a) => ({ flex:1, padding:"10px 0 8px", border:"none", background:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, color:a?C.navy:C.textFaint, borderTop:a?`2px solid ${C.navy}`:"2px solid transparent" }),
  navIcon: { fontSize:20 },
  navLabel: (a) => ({ fontSize:10, fontWeight:a?700:400 }),
  formGroup: { marginBottom:16 },
  select: { width:"100%", padding:"11px 13px", border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:14, outline:"none", boxSizing:"border-box", background:C.white },
  textarea: { width:"100%", padding:"11px 13px", border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:13, outline:"none", boxSizing:"border-box", resize:"vertical", minHeight:70, background:C.white },
  btnSuccess: { width:"100%", padding:"12px", background:C.green, color:C.white, border:"none", borderRadius:8, fontSize:14, fontWeight:600, cursor:"pointer" },
  btnDanger: { width:"100%", padding:"12px", background:C.white, color:C.red, border:`1.5px solid ${C.red}`, borderRadius:8, fontSize:14, fontWeight:600, cursor:"pointer", marginTop:8 },
  btnSecondary: { padding:"7px 14px", background:C.surface, color:C.textMid, border:`1px solid ${C.border}`, borderRadius:7, fontSize:13, cursor:"pointer" },
  btnOutline: { width:"100%", padding:"12px", background:C.white, color:C.navy, border:`1.5px solid ${C.navy}`, borderRadius:8, fontSize:14, fontWeight:600, cursor:"pointer", marginTop:8 },
  divider: { border:"none", borderTop:`1px solid ${C.border}`, margin:"14px 0" },
  sectionTitle: { fontSize:16, fontWeight:700, color:C.navy, margin:"0 0 14px" },
  row: { display:"flex", alignItems:"center", justifyContent:"space-between" },
  alertSuccess: { background:"#F0FDF4", color:C.green, border:"1px solid #BBF7D0", padding:"11px 14px", borderRadius:8, fontSize:13, fontWeight:600, marginBottom:16 },
  revenueCard: { background:C.navy, color:C.white, borderRadius:10, padding:"18px 16px", marginBottom:12 },
  loadingWrap: { display:"flex", alignItems:"center", justifyContent:"center", padding:"48px 0", color:C.textFaint },
};

function getToken() { return localStorage.getItem('token'); }
function setToken(t) { localStorage.setItem('token', t); }
function removeToken() { localStorage.removeItem('token'); }

async function apiCall(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Ошибка сервера');
  return data;
}

function StatusBadge({status}) {
  return <span style={S.badge(status)}>{SL[status]||status}</span>;
}

function PaymentTags({payment}) {
  if (!payment) return null;
  const tags = [];
  if (payment.cash>0) tags.push({label:`Нал: ${payment.cash.toLocaleString()} ₸`, bg:C.cashGreen, color:"#15803D"});
  if (payment.qr>0)   tags.push({label:`QR: ${payment.qr.toLocaleString()} ₸`,   bg:C.qrBlue,   color:"#1D4ED8"});
  if (payment.debt>0) tags.push({label:`Долг: ${payment.debt.toLocaleString()} ₸`, bg:C.debtAmber, color:"#92400E"});
  return <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>{tags.map((t,i)=><span key={i} style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:4,background:t.bg,color:t.color}}>{t.label}</span>)}</div>;
}

function OrderCard({order, onOpen, onEdit}) {
  const items = typeof order.items === 'string' ? JSON.parse(order.items||'[]') : (order.items||[]);
  const payment = typeof order.payment === 'string' ? JSON.parse(order.payment||'{}') : (order.payment||{cash:order.payment_cash||0,qr:order.payment_qr||0,debt:order.payment_debt||0});
  return (
    <div style={{...S.card, borderLeft:`3px solid ${SC[order.status]||'#999'}`}}>
      <div style={{...S.row, cursor:"pointer"}} onClick={()=>onOpen(order)}>
        <div style={{flex:1,marginRight:10}}>
          <p style={S.cardTitle}>#{order.id} · {order.client_name||order.clientName}</p>
          <p style={S.cardSub}>{order.address} · {order.time_slot||order.timeSlot}</p>
        </div>
        <StatusBadge status={order.status}/>
      </div>
      <p style={{margin:"8px 0 4px",fontSize:13,color:C.textSub}}>{items.length} поз. · <span style={{fontWeight:700,color:C.text}}>{(order.total||0).toLocaleString()} ₸</span></p>
      <PaymentTags payment={payment}/>
      {onEdit && order.status==="new" && (
        <button onClick={e=>{e.stopPropagation();onEdit(order);}} style={{marginTop:8,padding:"6px 14px",background:"#EEF2F8",color:C.navy,border:`1px solid ${C.border}`,borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer"}}>✏️ Редактировать</button>
      )}
    </div>
  );
}

function DriverPaymentBlock({ order, onUpdateStatus }) {
  const [payType, setPayType] = useState({ cash: false, qr: false });
  const [payAmounts, setPayAmt] = useState({ cash: "", qr: "" });
  const total = order.total || 0;
  const cashPaid = payType.cash ? Number(payAmounts.cash)||0 : 0;
  const qrPaid   = payType.qr   ? Number(payAmounts.qr)  ||0 : 0;
  const autodebt = Math.max(0, total - cashPaid - qrPaid);

  return (
    <div style={{marginTop:20}}>
      <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:C.navy}}>Способ оплаты:</p>
      {[{key:"cash",label:"Наличка",icon:"💵",bg:C.cashGreen,col:"#15803D"},{key:"qr",label:"QR код",icon:"📲",bg:C.qrBlue,col:"#1D4ED8"}].map(({key,label,icon,bg,col})=>(
        <div key={key} style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div onClick={()=>setPayType(pt=>({...pt,[key]:!pt[key]}))} style={{width:22,height:22,borderRadius:6,border:`2px solid ${payType[key]?col:C.border}`,background:payType[key]?col:C.white,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {payType[key]&&<span style={{color:C.white,fontSize:13,fontWeight:700}}>✓</span>}
            </div>
            <span style={{fontSize:14,fontWeight:600,color:payType[key]?col:C.textMid}}>{icon} {label}</span>
            {payType[key]&&<input style={{flex:1,border:`1.5px solid ${col}40`,borderRadius:6,padding:"6px 10px",fontSize:14,fontWeight:600,outline:"none",background:bg,color:col}} placeholder="Сумма ₸" value={payAmounts[key]} onChange={e=>setPayAmt(a=>({...a,[key]:e.target.value}))}/>}
          </div>
        </div>
      ))}
      <div style={{padding:"12px 14px",borderRadius:8,background:C.surface,border:`1px solid ${C.border}`,marginBottom:14}}>
        <div style={{...S.row,marginBottom:6}}><span style={{fontSize:12,color:C.textSub}}>Сумма заявки</span><span style={{fontWeight:700}}>{total.toLocaleString()} ₸</span></div>
        <div style={{...S.row,paddingTop:6,borderTop:`1px solid ${C.border}`}}>
          <span style={{fontSize:13,fontWeight:700,color:autodebt>0?"#92400E":C.green}}>{autodebt>0?"📋 Долг":"✅ Полностью оплачено"}</span>
          {autodebt>0&&<span style={{fontWeight:800,fontSize:15,color:"#92400E"}}>{autodebt.toLocaleString()} ₸</span>}
        </div>
      </div>
      <button style={S.btnSuccess} onClick={()=>onUpdateStatus(order.id,"delivered",{cash:cashPaid,qr:qrPaid,debt:autodebt})}>✅ Подтвердить доставку</button>
      <button style={S.btnDanger} onClick={()=>onUpdateStatus(order.id,"cancelled",null)}>❌ Не удалось доставить</button>
      <button style={{...S.btnOutline,borderColor:"#7C3AED",color:"#7C3AED",marginTop:8}} onClick={()=>onUpdateStatus(order.id,"returned",null)}>↩️ Оформить возврат</button>
    </div>
  );
}

function OrderDetail({ order, onClose, onUpdateStatus, currentUser }) {
  const items = typeof order.items === 'string' ? JSON.parse(order.items||'[]') : (order.items||[]);
  const payment = typeof order.payment === 'string' ? JSON.parse(order.payment||'{}') : (order.payment||{cash:order.payment_cash||0,qr:order.payment_qr||0,debt:order.payment_debt||0});
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",zIndex:200,overflowY:"auto"}}>
      <div style={{background:C.white,margin:"16px",borderRadius:12,padding:20,maxWidth:480,marginLeft:"auto",marginRight:"auto",border:`1px solid ${C.border}`}}>
        <div style={{...S.row,marginBottom:14}}>
          <div>
            <p style={{margin:0,fontSize:11,color:C.textFaint,fontWeight:600,textTransform:"uppercase"}}>Заявка</p>
            <p style={{margin:0,fontSize:18,fontWeight:700,color:C.navy}}>#{order.id}</p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <StatusBadge status={order.status}/>
            <button style={S.btnSecondary} onClick={onClose}>✕</button>
          </div>
        </div>
        <hr style={S.divider}/>
        {[["Клиент",order.client_name||order.clientName],["Адрес",order.address],["Торговый",order.sales_name||order.salesName],["Дата",order.date],["Доставка",order.time_slot||order.timeSlot],...(order.comment?[["Комментарий",order.comment]]:[])].map(([k,v])=>(
          <div key={k} style={{...S.row,marginBottom:8,alignItems:"flex-start"}}>
            <span style={{fontSize:12,color:C.textFaint,fontWeight:600,minWidth:90,textTransform:"uppercase"}}>{k}</span>
            <span style={{fontSize:13,color:C.text,textAlign:"right",flex:1}}>{v}</span>
          </div>
        ))}
        <hr style={S.divider}/>
        <p style={{margin:"0 0 10px",fontSize:12,fontWeight:600,color:C.textFaint,textTransform:"uppercase"}}>Состав</p>
        {items.map((item,i)=>(
          <div key={i} style={{...S.row,marginBottom:8,fontSize:13}}>
            <span style={{color:C.textMid}}>{item.name}</span>
            <span style={{color:C.textSub}}>{item.qty} × {item.price} ₸ = <strong style={{color:C.text}}>{(item.qty*item.price).toLocaleString()} ₸</strong></span>
          </div>
        ))}
        <hr style={S.divider}/>
        <div style={{...S.row,fontSize:15,fontWeight:700,marginBottom:10}}>
          <span style={{color:C.textMid}}>Итого</span>
          <span style={{color:C.navy}}>{(order.total||0).toLocaleString()} ₸</span>
        </div>
        <p style={{margin:"0 0 8px",fontSize:12,fontWeight:600,color:C.textFaint,textTransform:"uppercase"}}>Оплата</p>
        <PaymentTags payment={payment}/>
        {currentUser.role==="driver" && order.status==="in_transit" && (
          <DriverPaymentBlock order={order} onUpdateStatus={onUpdateStatus}/>
        )}
        {currentUser.role==="driver" && order.status==="new" && (
          <div style={{marginTop:20}}>
            <button style={S.btnPrimary} onClick={()=>onUpdateStatus(order.id,"in_transit",null)}>🚚 Взять в доставку</button>
          </div>
        )}
        {currentUser.role==="sales" && order.status==="new" && (
          <div style={{marginTop:20}}>
            <button style={S.btnDanger} onClick={()=>onUpdateStatus(order.id,"cancelled",null)}>🗑 Отозвать заявку</button>
          </div>
        )}
        {(currentUser.role==="admin"||currentUser.role==="manager") && order.status==="new" && (
          <div style={{marginTop:20}}>
            <button style={S.btnOutline} onClick={()=>onUpdateStatus(order.id,"in_transit",null)}>🚚 Передать водителю</button>
          </div>
        )}
        {(currentUser.role==="admin"||currentUser.role==="manager") && order.status==="in_transit" && (
          <div style={{marginTop:20}}>
            <button style={{...S.btnOutline,borderColor:"#7C3AED",color:"#7C3AED"}} onClick={()=>onUpdateStatus(order.id,"returned",null)}>↩️ Оформить возврат</button>
          </div>
        )}
      </div>
    </div>
  );
}

function SalesCabinet({ user, token, onLogout }) {
  const [tab, setTab] = useState("orders");
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [clientId, setClientId] = useState("");
  const [timeSlot, setTimeSlot] = useState("");
  const [comment, setComment] = useState("");
  const [editOrder, setEditOrder] = useState(null);
  const newLine = () => ({uid:Math.random(),productId:null,name:"",qty:"",price:"",search:"",showDrop:false});
  const [lines, setLines] = useState([newLine()]);

  const [products, setProducts] = useState([]);
  useEffect(() => {
    fetch('/api/products')
  .then(r => r.json())
  .then(data => setProducts(data.map((p, i) => ({
    id: i + 1,
    name: p.display_name || p.name,
    price: p.price || 0,
    unit: p.unit || 'кг',
    group: p.group || '',
    code: p.code
  }))))
  .catch(() => {});
  }, []);

  const loadOrders = useCallback(async () => {
    try {
      const data = await apiCall('GET', '/api/orders');
      setOrders(data);
    } catch(e) { if(e.message.includes('токен')) onLogout(); }
    setLoading(false);
  }, []);

  useEffect(() => { loadOrders(); }, []);

  const updateLine = (uid,patch) => setLines(ls=>ls.map(l=>l.uid===uid?{...l,...patch}:l));
  const removeLine = (uid) => setLines(ls=>ls.length>1?ls.filter(l=>l.uid!==uid):ls);
  const addLine = () => setLines(ls=>[...ls,newLine()]);
  const selectProduct = (uid,prod) => updateLine(uid,{productId:prod.id,name:prod.name,price:prod.price,search:prod.name,showDrop:false,qty:""});

  const filledLines = lines.filter(l=>l.name&&Number(l.qty)>0&&Number(l.price)>0);
  const total = filledLines.reduce((s,l)=>s+Number(l.qty)*Number(l.price),0);

  const handleSubmit = async () => {
    if (!clientId||filledLines.length===0||!timeSlot) return;
    const client = CLIENTS.find(c=>c.id===Number(clientId));
    const items = filledLines.map(l=>({id:l.productId,name:l.name,qty:Number(l.qty),price:Number(l.price)}));
    try {
      await apiCall('POST','/api/orders',{clientName:client.name,address:client.address,timeSlot,items,total,paymentCash:0,paymentQr:0,paymentDebt:0,comment});
      setLines([newLine()]); setClientId(""); setTimeSlot(""); setComment("");
      setSubmitted(true); setTab("orders"); loadOrders();
      setTimeout(()=>setSubmitted(false),4000);
    } catch(e) { alert(e.message); }
  };

  const handleUpdateStatus = async (id, status, payment) => {
    try {
      await apiCall('PUT',`/api/orders/${id}/status`,{status});
      setSelectedOrder(null); loadOrders();
    } catch(e) { alert(e.message); }
  };

  const stats = {total:orders.length,delivered:orders.filter(o=>o.status==="delivered").length,inTransit:orders.filter(o=>o.status==="in_transit").length,new:orders.filter(o=>o.status==="new").length};

  return (
    <div style={{paddingBottom:72}}>
      {selectedOrder&&<OrderDetail order={selectedOrder} onClose={()=>setSelectedOrder(null)} onUpdateStatus={handleUpdateStatus} currentUser={user}/>}
      {editOrder&&(
        <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",zIndex:200,overflowY:"auto"}}>
          <div style={{background:"#fff",margin:"16px",borderRadius:12,padding:20,maxWidth:480,marginLeft:"auto",marginRight:"auto"}}>
            <div style={{...S.row,marginBottom:16}}>
              <p style={{margin:0,fontSize:17,fontWeight:700,color:C.navy}}>Редактирование #{editOrder.id}</p>
              <button style={S.btnSecondary} onClick={()=>setEditOrder(null)}>✕</button>
            </div>
            <p style={{fontSize:13,color:C.textSub,marginBottom:16}}>Для редактирования отзовите заявку и создайте новую</p>
            <button style={S.btnDanger} onClick={async()=>{
              try {
                await apiCall('PUT',`/api/orders/${editOrder.id}/status`,{status:"cancelled"});
                setEditOrder(null); loadOrders();
              } catch(e){alert(e.message);}
            }}>🗑 Отозвать заявку</button>
            <button style={{...S.btnOutline,marginTop:8}} onClick={()=>{setEditOrder(null);setTab("new");}}>📝 Создать новую заявку</button>
          </div>
        </div>
      )}
      <div style={S.page}>
        {tab==="orders"&&<>
          <p style={S.sectionTitle}>Мои заявки</p>
          {submitted&&<div style={S.alertSuccess}>Заявка успешно создана!</div>}
          {loading?<div style={S.loadingWrap}>Загрузка...</div>:<>
            <div style={S.statsRow}>
              <div style={S.statCard(C.navy)}><p style={S.statNum}>{stats.total}</p><p style={S.statLabel}>Всего</p></div>
              <div style={S.statCard(C.green)}><p style={S.statNum}>{stats.delivered}</p><p style={S.statLabel}>Доставлено</p></div>
              <div style={S.statCard(C.amber)}><p style={S.statNum}>{stats.inTransit}</p><p style={S.statLabel}>В пути</p></div>
              <div style={S.statCard(C.accent)}><p style={S.statNum}>{stats.new}</p><p style={S.statLabel}>Новых</p></div>
            </div>
            {orders.length===0?<div style={{textAlign:"center",padding:"48px 0",color:C.textFaint}}><div style={{fontSize:40,marginBottom:12}}>📋</div><p>Заявок пока нет</p></div>
              :orders.map(o=><OrderCard key={o.id} order={o} onOpen={setSelectedOrder} onEdit={o.status==="new"?setEditOrder:null}/>)}
          </>}
        </>}
        {tab==="new"&&<>
          <p style={S.sectionTitle}>Новая заявка</p>
          <div style={S.card}>
            <div style={S.formGroup}>
              <label style={S.label}>Контрагент</label>
              <select style={S.select} value={clientId} onChange={e=>setClientId(e.target.value)}>
                <option value="">— Выберите контрагента —</option>
                {CLIENTS.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              {clientId&&<p style={{margin:"6px 0 0",fontSize:12,color:C.textSub}}>📍 {CLIENTS.find(c=>c.id===Number(clientId))?.address}</p>}
            </div>
            <div style={S.formGroup}>
              <label style={S.label}>Время доставки</label>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {TIME_SLOTS.map(slot=>(
                  <button key={slot} onClick={()=>setTimeSlot(slot)} style={{padding:"12px",borderRadius:8,border:`1.5px solid ${timeSlot===slot?C.navy:C.border}`,background:timeSlot===slot?C.navy:C.white,color:timeSlot===slot?C.white:C.textMid,fontSize:14,fontWeight:500,cursor:"pointer",textAlign:"left"}}>{slot}</button>
                ))}
              </div>
            </div>
          </div>
          <div style={S.card}>
            <div style={{...S.row,marginBottom:12}}>
              <label style={S.label}>
                Номенклатура {products.length>0&&<span style={{color:C.green,fontWeight:400,fontSize:11}}>({products.length} поз. из 1С)</span>}
              </label>
              <button onClick={addLine} style={{background:C.navy,color:C.white,border:"none",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Строка</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 64px 80px 28px",gap:6,marginBottom:6}}>
              {["Наименование","Кол-во","Цена ₸",""].map((h,i)=><div key={i} style={{fontSize:10,fontWeight:600,color:C.textFaint,textTransform:"uppercase"}}>{h}</div>)}
            </div>
            {lines.map(line=>{
              const matched=line.search.length>0?products.filter(p=>p.name.toLowerCase().includes(line.search.toLowerCase())):products.slice(0,50);
              const lineTotal=Number(line.qty)>0&&Number(line.price)>0?Number(line.qty)*Number(line.price):null;
              return(
                <div key={line.uid} style={{marginBottom:8}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 64px 80px 28px",gap:6,alignItems:"center"}}>
                    <div style={{position:"relative"}}>
                      <input style={{...S.input,padding:"8px 10px",fontSize:13}} placeholder="Введите товар..." value={line.search}
                        onChange={e=>updateLine(line.uid,{search:e.target.value,name:e.target.value,productId:null,price:"",showDrop:true})}
                        onFocus={()=>updateLine(line.uid,{showDrop:true})}
                        onBlur={()=>setTimeout(()=>updateLine(line.uid,{showDrop:false}),180)}
                      />
                      {line.showDrop&&matched.length>0&&(
                        <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.white,border:`1px solid ${C.border}`,borderRadius:8,boxShadow:"0 4px 16px rgba(0,0,0,0.1)",zIndex:50,maxHeight:180,overflowY:"auto"}}>
                          {matched.map(p=>(
                            <div key={p.id} onMouseDown={()=>selectProduct(line.uid,p)} style={{padding:"9px 12px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,fontSize:13}}>
                              <div style={{fontWeight:600}}>{p.name}</div>
                              <div style={{fontSize:11,color:C.textFaint}}>{p.price>0?p.price.toLocaleString()+' ₸ / ':''}{p.unit}{p.group?' · '+p.group:''}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                    <input style={{...S.input,padding:"8px 6px",fontSize:13,textAlign:"center"}} placeholder="кол" value={line.qty} type="number" min="1"
                      onChange={e=>updateLine(line.uid,{qty:e.target.value})}
                      onFocus={e=>e.target.select()}
                    />
                    <input style={{...S.input,padding:"8px 6px",fontSize:13,textAlign:"right"}} placeholder="цена" value={line.price} type="number"
                      onChange={e=>updateLine(line.uid,{price:e.target.value})}
                      onFocus={e=>e.target.select()}
                    />
                    <button onClick={()=>removeLine(line.uid)} style={{width:28,height:34,border:`1px solid ${C.border}`,borderRadius:6,background:C.surface,cursor:"pointer",fontSize:14,color:C.textFaint}}>×</button>
                  </div>
                  {lineTotal&&<div style={{textAlign:"right",fontSize:11,color:C.textSub,marginTop:2,paddingRight:34}}>= <strong style={{color:C.navy}}>{lineTotal.toLocaleString()} ₸</strong></div>}
                </div>
              );
            })}
            {filledLines.length>0&&<><hr style={{...S.divider,marginTop:8}}/><div style={S.row}><span style={{fontSize:13,color:C.textSub}}>Итого</span><span style={{fontSize:16,fontWeight:800,color:C.navy}}>{total.toLocaleString()} ₸</span></div></>}
          </div>
          <div style={S.card}>
            <div style={S.formGroup}>
              <label style={S.label}>Комментарий</label>
              <textarea style={S.textarea} value={comment} onChange={e=>setComment(e.target.value)} placeholder="Особые пожелания..."/>
            </div>
            <button style={{...S.btnPrimary,opacity:(!clientId||filledLines.length===0||!timeSlot)?0.45:1}} onClick={handleSubmit} disabled={!clientId||filledLines.length===0||!timeSlot}>Отправить заявку</button>
          </div>
        </>}
      </div>
      <div style={S.nav}>
        {[["orders","📋","Заявки"],["new","✍","Создать"]].map(([k,ic,lb])=>(
          <button key={k} style={S.navBtn(tab===k)} onClick={()=>setTab(k)}>
            <span style={S.navIcon}>{ic}</span><span style={S.navLabel(tab===k)}>{lb}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function DriverCabinet({ user, onLogout }) {
  const [tab, setTab] = useState("queue");
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [products, setProducts] = useState([]);
const [aliasSearch, setAliasSearch] = useState("");
const [aliasEdits, setAliasEdits] = useState({});
const [savingCode, setSavingCode] = useState(null);

const loadProducts = useCallback(async () => {
  try {
    const data = await fetch('/api/products').then(r => r.json());
    setProducts(data);
  } catch(e) {}
}, []);

useEffect(() => { loadProducts(); }, []);

const saveAlias = async (code) => {
  const alias = aliasEdits[code] ?? "";
  setSavingCode(code);
  try {
    await apiCall('POST', '/api/product-aliases', { code, alias });
    await loadProducts();
  } catch(e) { alert(e.message); }
  setSavingCode(null);
};

  const loadOrders = useCallback(async () => {
    try {
      const data = await apiCall('GET', '/api/orders');
      setOrders(data);
    } catch(e) { if(e.message.includes('токен')) onLogout(); }
    setLoading(false);
  }, []);

  useEffect(() => { loadOrders(); }, []);

  const handleUpdate = async (id, status, payment) => {
    try {
      await apiCall('PUT', `/api/orders/${id}/status`, { status });
      setSelectedOrder(null); loadOrders();
    } catch(e) { alert(e.message); }
  };

  const queue=orders.filter(o=>o.status==="new");
  const myActive=orders.filter(o=>o.status==="in_transit");
  const done=orders.filter(o=>o.status==="delivered");
  const failed=orders.filter(o=>o.status==="cancelled");
  const returned=orders.filter(o=>o.status==="returned");
  const shown=tab==="queue"?queue:tab==="active"?myActive:tab==="done"?done:tab==="failed"?failed:returned;

  return (
    <div style={{paddingBottom:72}}>
      {selectedOrder&&<OrderDetail order={selectedOrder} onClose={()=>setSelectedOrder(null)} onUpdateStatus={handleUpdate} currentUser={user}/>}
      <div style={S.page}>
        <div style={S.statsRow}>
          <div style={S.statCard(C.accent)}><p style={S.statNum}>{queue.length}</p><p style={S.statLabel}>Ожидают</p></div>
          <div style={S.statCard(C.amber)}><p style={S.statNum}>{myActive.length}</p><p style={S.statLabel}>В пути</p></div>
          <div style={S.statCard(C.green)}><p style={S.statNum}>{done.length}</p><p style={S.statLabel}>Доставлено</p></div>
          <div style={S.statCard("#7C3AED")}><p style={S.statNum}>{returned.length}</p><p style={S.statLabel}>Возвратов</p></div>
        </div>
        <p style={S.sectionTitle}>{tab==="queue"?"Очередь":tab==="active"?"В пути":tab==="done"?"Доставлено":tab==="failed"?"Не доставлено":"Возвраты"}</p>
        {loading?<div style={S.loadingWrap}>Загрузка...</div>:shown.length===0
          ?<div style={{textAlign:"center",padding:"48px 0",color:C.textFaint}}><div style={{fontSize:40,marginBottom:12}}>🚗</div><p>Нет заявок</p></div>
          :shown.map(o=>(
            <div key={o.id} style={{...S.card,cursor:"pointer",borderLeft:`3px solid ${SC[o.status]||'#999'}`}} onClick={()=>setSelectedOrder(o)}>
              <div style={S.row}>
                <div style={{flex:1,marginRight:10}}>
                  <p style={S.cardTitle}>#{o.id} · {o.client_name}</p>
                  <p style={S.cardSub}>{o.address}</p>
                  <p style={{...S.cardSub,marginTop:2}}>🕐 {o.time_slot} · {o.sales_name}</p>
                </div>
                <StatusBadge status={o.status}/>
              </div>
              <p style={{margin:"8px 0 4px",fontSize:13,color:C.textSub}}><span style={{fontWeight:700,color:C.text}}>{(o.total||0).toLocaleString()} ₸</span></p>
              {tab==="queue"&&<button onClick={e=>{e.stopPropagation();handleUpdate(o.id,"in_transit",null);}} style={{marginTop:10,width:"100%",padding:"9px",background:C.navy,color:C.white,border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>🚚 Взять в доставку</button>}
            </div>
          ))
        }
      </div>
      <div style={S.nav}>
        {[["queue","📋","Очередь"],["active","🚚","В пути"],["done","✅","Доставлено"],["failed","✕","Не достав."],["returned","↩️","Возврат"]].map(([k,ic,lb])=>(
          <button key={k} style={{...S.navBtn(tab===k),flex:1}} onClick={()=>setTab(k)}>
            <span style={S.navIcon}>{ic}</span><span style={S.navLabel(tab===k)}>{lb}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function AdminCabinet({ user, onLogout }) {
  const [tab, setTab] = useState("all");
  const [filter, setFilter] = useState("all");
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [products, setProducts] = useState([]);
  const [aliasSearch, setAliasSearch] = useState("");
  const [aliasEdits, setAliasEdits] = useState({});
  const [savingCode, setSavingCode] = useState(null);

  const loadOrders = useCallback(async () => {
    try {
      const data = await apiCall('GET', '/api/orders');
      setOrders(data);
    } catch(e) { if(e.message.includes('токен')) onLogout(); }
    setLoading(false);
  }, []);

  useEffect(() => { loadOrders(); }, []);

  const loadProducts = useCallback(async () => {
    try {
      const data = await fetch('/api/products').then(r => r.json());
      setProducts(data);
    } catch(e) {}
  }, []);

  useEffect(() => { loadProducts(); }, []);

  const saveAlias = async (code) => {
    const alias = aliasEdits[code] ?? "";
    setSavingCode(code);
    try {
      await apiCall('POST', '/api/product-aliases', { code, alias });
      await loadProducts();
    } catch(e) { alert(e.message); }
    setSavingCode(null);
  };

  const handleUpdate = async (id, status, payment) => {
    try {
      await apiCall('PUT', `/api/orders/${id}/status`, { status });
      setSelectedOrder(null); loadOrders();
    } catch(e) { alert(e.message); }
  };

  const filtered = orders.filter(o=>filter==="all"||o.status===filter);
  const stats = {
    total:orders.length,
    delivered:orders.filter(o=>o.status==="delivered").length,
    inTransit:orders.filter(o=>o.status==="in_transit").length,
    cancelled:orders.filter(o=>o.status==="cancelled").length,
    returned:orders.filter(o=>o.status==="returned").length,
    revenue:orders.filter(o=>o.status==="delivered").reduce((s,o)=>s+(o.total||0),0),
    cashTotal:orders.filter(o=>o.status==="delivered").reduce((s,o)=>s+(o.payment_cash||0),0),
    qrTotal:orders.filter(o=>o.status==="delivered").reduce((s,o)=>s+(o.payment_qr||0),0),
    debtTotal:orders.reduce((s,o)=>s+(o.payment_debt||0),0),
  };
  const FILTERS=[["all","Все"],["new","Ожидает"],["in_transit","В пути"],["delivered","Доставлено"],["cancelled","Не доставлено"],["returned","Возврат"]];

  return (
    <div style={{paddingBottom:72}}>
      {selectedOrder&&<OrderDetail order={selectedOrder} onClose={()=>setSelectedOrder(null)} onUpdateStatus={handleUpdate} currentUser={user}/>}
      <div style={S.page}>
        {tab==="all"&&<>
          <p style={S.sectionTitle}>Все заявки</p>
          <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
            {FILTERS.map(([k,lb])=>(
              <button key={k} onClick={()=>setFilter(k)} style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${filter===k?C.navy:C.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:filter===k?C.navy:C.white,color:filter===k?C.white:C.textMid}}>{lb}</button>
            ))}
          </div>
          {loading?<div style={S.loadingWrap}>Загрузка...</div>:filtered.length===0
            ?<div style={{textAlign:"center",padding:"48px 0",color:C.textFaint}}><div style={{fontSize:40,marginBottom:12}}>📋</div><p>Заявок нет</p></div>
            :filtered.map(o=><OrderCard key={o.id} order={o} onOpen={setSelectedOrder}/>)
          }
        </>}
        {tab==="report"&&<>
          <p style={S.sectionTitle}>Отчёт</p>
          <div style={S.statsRow}>
            <div style={S.statCard(C.navy)}><p style={S.statNum}>{stats.total}</p><p style={S.statLabel}>Всего</p></div>
            <div style={S.statCard(C.green)}><p style={S.statNum}>{stats.delivered}</p><p style={S.statLabel}>Доставлено</p></div>
            <div style={S.statCard(C.amber)}><p style={S.statNum}>{stats.inTransit}</p><p style={S.statLabel}>В пути</p></div>
            <div style={S.statCard(C.red)}><p style={S.statNum}>{stats.cancelled}</p><p style={S.statLabel}>Не доставлено</p></div>
            <div style={S.statCard("#7C3AED")}><p style={S.statNum}>{stats.returned}</p><p style={S.statLabel}>Возвратов</p></div>
          </div>
          <div style={S.revenueCard}>
            <p style={{margin:"0 0 4px",fontSize:11,opacity:0.5,fontWeight:600,textTransform:"uppercase"}}>Общая выручка</p>
            <p style={{margin:"0 0 14px",fontSize:26,fontWeight:800}}>{stats.revenue.toLocaleString()} ₸</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[{label:"Наличка",val:stats.cashTotal},{label:"QR код",val:stats.qrTotal},{label:"Долг",val:stats.debtTotal}].map(({label,val})=>(
                <div key={label} style={{background:"rgba(255,255,255,0.1)",borderRadius:8,padding:"10px 8px"}}>
                  <p style={{margin:"0 0 2px",fontSize:10,opacity:0.7,fontWeight:600}}>{label.toUpperCase()}</p>
                  <p style={{margin:0,fontSize:13,fontWeight:800}}>{(val||0).toLocaleString()} ₸</p>
                </div>
              ))}
            </div>
          </div>
        </>}
        {tab==="aliases"&&<>
          <p style={S.sectionTitle}>Псевдонимы товаров</p>
          <p style={{fontSize:12,color:C.textSub,marginTop:-8,marginBottom:12}}>
            Название из 1С меняется от поставки к поставке — задай здесь постоянное имя, которое увидят торгпреды.
          </p>
          <input
            style={{...S.input,marginBottom:12}}
            placeholder="Поиск по названию или коду..."
            value={aliasSearch}
            onChange={e=>setAliasSearch(e.target.value)}
          />
          {products
            .filter(p => !aliasSearch || p.name.toLowerCase().includes(aliasSearch.toLowerCase()) || (p.code||'').includes(aliasSearch))
            .map(p => (
              <div key={p.code} style={{...S.card, padding:10, marginBottom:6}}>
                <div style={{fontSize:11,color:C.textFaint,marginBottom:2}}>Код 1С: {p.code} {p.group?' · '+p.group:''}</div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:6,color:C.textMid}}>{p.name}</div>
                <div style={{display:"flex",gap:6}}>
                  <input
                    style={{...S.input,padding:"7px 10px",fontSize:13}}
                    placeholder="Название для сайта (необязательно)"
                    value={aliasEdits[p.code] ?? (p.display_name !== p.name ? p.display_name : '')}
                    onChange={e=>setAliasEdits(a=>({...a,[p.code]:e.target.value}))}
                  />
                  <button
                    style={{...S.btnPrimary, padding:"7px 14px", fontSize:12, opacity: savingCode===p.code?0.5:1}}
                    disabled={savingCode===p.code}
                    onClick={()=>saveAlias(p.code)}
                  >Сохр.</button>
                </div>
              </div>
          ))}
          {products.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:C.textFaint}}>Номенклатура ещё не синхронизирована из 1С</div>}
        </>}
      </div>
      <div style={S.nav}>
        {[["all","📋","Заявки"],["report","📊","Отчёт"],["aliases","🏷","Товары"]].map(([k,ic,lb])=>(
          <button key={k} style={S.navBtn(tab===k)} onClick={()=>setTab(k)}>
            <span style={S.navIcon}>{ic}</span><span style={S.navLabel(tab===k)}>{lb}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
  const [user, setUser] = useState(null);
  const [login, setLogin] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const token = getToken();
    if (token) {
      try {
        const parts = token.split('.');
        const payload = JSON.parse(atob(parts[1]));
        if (payload.exp * 1000 > Date.now()) {
          setUser({ id: payload.id, name: payload.name, role: payload.role, region: payload.region });
        } else {
          removeToken();
        }
      } catch(e) {
        removeToken();
      }
    }
    setChecking(false);
  }, []);

  const handleLogin = async () => {
    setLoading(true); setError("");
    try {
      const data = await apiCall('POST', '/api/login', { login, password });
      setToken(data.token);
      setUser(data.user);
    } catch(e) {
      setError(e.message);
    }
    setLoading(false);
  };

  const handleLogout = () => { removeToken(); setUser(null); };
  const ROLE_LABEL = { sales:"Торговый представитель", driver:"Водитель", admin:"Администратор", manager:"Менеджер" };

  if (checking) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F8F9FB"}}>
      <div style={{fontSize:14,color:"#6B7280"}}>Загрузка...</div>
    </div>
  );

  if (!user) return (
    <div style={S.loginWrap}>
      <div style={S.loginCard}>
        <h1 style={S.logoTitle}>ЖАЙЫК АКТАУ</h1>
        <p style={S.logoSub}>Система управления заявками</p>
        {error&&<div style={S.errorBox}>{error}</div>}
        <div style={S.formGroup}><label style={S.label}>Логин</label><input style={S.input} value={login} onChange={e=>setLogin(e.target.value)} placeholder="Введите логин"/></div>
        <div style={{...S.formGroup,marginBottom:20}}><label style={S.label}>Пароль</label><input style={S.input} type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Введите пароль" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/></div>
        <button style={{...S.btnPrimary,opacity:loading?0.7:1}} onClick={handleLogin} disabled={loading}>{loading?"Вход...":"Войти"}</button>
      </div>
    </div>
  );

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div>
          <div style={S.headerMark}>ЖАЙЫК АКТАУ</div>
          <div style={S.headerSub}>{user.name} · {ROLE_LABEL[user.role]}</div>
        </div>
        <button style={S.logoutBtn} onClick={handleLogout}>Выйти</button>
      </div>
      {user.role==="sales"&&<SalesCabinet user={user} onLogout={handleLogout}/>}
      {user.role==="driver"&&<DriverCabinet user={user} onLogout={handleLogout}/>}
      {(user.role==="admin"||user.role==="manager")&&<AdminCabinet user={user} onLogout={handleLogout}/>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
